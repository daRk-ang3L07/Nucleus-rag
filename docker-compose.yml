services:
  rag-backend:
    build: .
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - CHROMA_DB_PATH=/app/chroma_db
    restart: always

  rag-frontend:
    build:
      context: ./frontend
      args:
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "3000:80"
    depends_on:
      - rag-backend
    restart: always

volumes:
  chroma_data:
